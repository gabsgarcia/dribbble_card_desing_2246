<html>
  <head>
    <title>Dribbble card</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="container">
      <h1 class="text-center"> Copy Cat Dribble Card</h1>
      <div class="cards">
        <div class="card-container">
            <div class="card-white">
                <div class="card-white-image" style="background-image: url('https://loremflickr.com/320/240/fish');">
                    <a href="" class="btn">Save</a>
                </div>
                <ul class="list-inline">
                    <li><i class="fas fa-eye"></i>15</li>
                    <li><i class="fas fa-comment"></i>60</li>
                    <li><i class="fas fa-heart"></i>89</li>
                </ul>
            </div>
            <div class="card-user">
                <img src="https://loremflickr.com/240/240/dog" alt="user-avatar" class="avatar">
                <a href="">arthur-littm</a>

            </div>
        </div>
        <div class="card-container">
            <div class="card-white">
                <div class="card-white-image" style="background-image: url('https://loremflickr.com/320/240/dog');">
                    <a href="" class="btn">Save</a>
                </div>
                <ul class="list-inline">
                    <li><i class="fas fa-eye"></i>15</li>
                    <li><i class="fas fa-comment"></i>60</li>
                    <li><i class="fas fa-heart"></i>89</li>
                </ul>
            </div>
            <div class="card-user">
                <img src="https://loremflickr.com/240/240/dog" alt="user-avatar" class="avatar">
                <a href="">arthur-littm</a>

            </div>
        </div>
        <div class="card-container">
            <div class="card-white">
                <div class="card-white-image" style="background-image: url('https://loremflickr.com/320/240/cat');">
                    <a href="" class="btn">Save</a>
                </div>
                <ul class="list-inline">
                    <li><i class="fas fa-eye"></i>15</li>
                    <li><i class="fas fa-comment"></i>60</li>
                    <li><i class="fas fa-heart"></i>89</li>
                </ul>
            </div>
            <div class="card-user">
                <img src="https://loremflickr.com/240/240/dog" alt="user-avatar" class="avatar">
                <a href="">arthur-littm</a>

            </div>
        </div>
      </div> 
    </div>    
  </body>
</html>
